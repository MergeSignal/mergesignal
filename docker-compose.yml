services:
  db:
    image: postgres:16
    container_name: mergesignal-db
    environment:
      POSTGRES_USER: mergesignal
      POSTGRES_PASSWORD: mergesignal
      POSTGRES_DB: mergesignal
    ports:
      - "5433:5432"
    volumes:
      - mergesignal_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mergesignal-redis
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: mergesignal-worker
    environment:
      DATABASE_URL: postgresql://mergesignal:mergesignal@db:5432/mergesignal
      REDIS_URL: redis://redis:6379
      MERGESIGNAL_ENGINE_IMPL: ""
      MERGESIGNAL_ENGINE_STRICT: "0"
    depends_on:
      - db
      - redis

volumes:
  mergesignal_pg:
