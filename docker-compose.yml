services:
  db:
    image: postgres:16
    container_name: mergesignal-db
    environment:
      POSTGRES_USER: mergesignal
      POSTGRES_PASSWORD: mergesignal
      POSTGRES_DB: mergesignal
    ports:
      - "5433:5432"
    volumes:
      - mergesignal_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mergesignal-redis
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        MERGESIGNAL_ENGINE_FIXTURE: "1"
      secrets:
        - engine_repo_token
    container_name: mergesignal-worker
    # Local dev only: uses OSS stub (not the production engine image).
    # Production worker image requires private engine at Docker build time — see docs/self-host/fly.md.
    environment:
      DATABASE_URL: postgresql://mergesignal:mergesignal@db:5432/mergesignal
      REDIS_URL: redis://redis:6379
      MERGESIGNAL_ENGINE_IMPL: ""
      MERGESIGNAL_ENGINE_STRICT: "0"
    depends_on:
      - db
      - redis

volumes:
  mergesignal_pg:

secrets:
  engine_repo_token:
    file: .docker/empty-secret
