# Fly.io background BullMQ scan worker (no HTTP service).
# Deploy: flyctl deploy . --config apps/worker/fly.toml --dockerfile apps/worker/Dockerfile
#
# Required Fly secrets (must match mergesignal-api):
#   DATABASE_URL, REDIS_URL
#   GITHUB_APP_ID, GITHUB_PRIVATE_KEY (source corpus fetch for PR scans)
#
# Engine is baked into the image at build time (see apps/worker/Dockerfile).
# Production deploy requires GitHub vars/secrets:
#   MERGESIGNAL_ENGINE_REF (repo variable, semver tag)
#   MERGESIGNAL_ENGINE_REPO_TOKEN (Actions secret)
#
# Do NOT set MERGESIGNAL_ALLOW_STUB in production.

app = "mergesignal-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  CODE_ANALYSIS_TIMEOUT_MS = "30000"
  CODE_ANALYSIS_CACHE_TTL_MS = "3600000"
  WORKER_CONCURRENCY = "1"

[processes]
  worker = "node --enable-source-maps apps/worker/dist/index.js"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
