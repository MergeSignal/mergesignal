# Customer-facing trusted scan. Workflow display name + job id define the GitHub check (e.g. MergeSignal / Analysis).
# Structure invariants: apps/cli/src/mergesignalScanWorkflow.test.ts — update when changing fork rules or scan_profile.
name: MergeSignal

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_above:
        description: "Fail if totalScore > this value (0..100). Leave empty to not fail."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: merge-signal-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require trusted credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.MERGESIGNAL_NPM_TOKEN }}" ]; then
            echo "::error::MergeSignal trusted scan requires repository secret MERGESIGNAL_NPM_TOKEN."
            exit 1
          fi
          if [ -z "${{ secrets.MERGESIGNAL_ENGINE_PACKAGE }}" ]; then
            echo "::error::MergeSignal trusted scan requires repository secret MERGESIGNAL_ENGINE_PACKAGE."
            exit 1
          fi

      - name: MergeSignal scan
        uses: ./.github/actions/merge-signal-scan
        with:
          fail_above: ${{ github.event.inputs.fail_above || '' }}
          scan_profile: trusted
          npm_registry_url: ${{ vars.MERGESIGNAL_NPM_REGISTRY_URL || 'https://registry.npmjs.org' }}
          engine_package: ${{ secrets.MERGESIGNAL_ENGINE_PACKAGE }}
          engine_impl_module: ${{ vars.MERGESIGNAL_ENGINE_IMPL_MODULE }}
          npm_token: ${{ secrets.MERGESIGNAL_NPM_TOKEN }}

      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mergesignal-scan
          path: ${{ runner.temp }}/mergesignal-scan.json
          if-no-files-found: error
