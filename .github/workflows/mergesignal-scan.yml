# Customer-facing trusted scan. Workflow name + job `name:` define the GitHub check (e.g. MergeSignal / Dependency review).
# Structure invariants: apps/cli/src/mergesignalScanWorkflow.test.ts — update when changing fork/Dependabot rules or scan_profile.
#
# Dogfood (github.repository == MergeSignal/mergesignal): trusted scan is mandatory — missing
# MERGESIGNAL_ENGINE_REPO_TOKEN fails the job (no stub/demo downgrade). Other repos skip the scan when the token is absent.
name: MergeSignal

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_above:
        description: "Fail if totalScore > this value (0..100). Leave empty to not fail."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: merge-signal-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mergesignal_scan:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Composite steps read this via env context (more reliable than with: alone for repository secrets).
      MERGESIGNAL_ENGINE_REPO_TOKEN: ${{ secrets.MERGESIGNAL_ENGINE_REPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MergeSignal PR context
        id: ms_context
        env:
          MS_ENGINE_PAT: ${{ secrets.MERGESIGNAL_ENGINE_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          CANONICAL="MergeSignal/mergesignal"
          fail_trusted_required_no_pat() {
            SUMMARY="$(node -p "JSON.parse(require('fs').readFileSync('scripts/ci/scan-surface-copy.generated.json','utf8'))['actions.trustedWorkflowSecretMissing']")"
            HINT="$(node -p "JSON.parse(require('fs').readFileSync('scripts/ci/scan-surface-copy.generated.json','utf8'))['actions.trustedWorkflowCredentialHintBody']")"
            echo "::error::${SUMMARY}" >&2
            {
              echo "## MergeSignal"
              echo ""
              echo "$SUMMARY"
              echo ""
              echo "$HINT"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            if [ -n "${MS_ENGINE_PAT:-}" ]; then
              echo "run_trusted_scan=true" >> "$GITHUB_OUTPUT"
            elif [ "$REPO" = "$CANONICAL" ]; then
              fail_trusted_required_no_pat
            else
              echo "run_trusted_scan=false" >> "$GITHUB_OUTPUT"
              MSG="$(node -p "JSON.parse(require('fs').readFileSync('scripts/ci/scan-surface-copy.generated.json','utf8'))['actions.pushTrustedScanSkippedNoEngineToken']")"
              {
                echo "## MergeSignal"
                echo ""
                echo "$MSG"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          BOT=0
          if [[ "$ACTOR" == dependabot* ]]; then
            BOT=1
          fi
          if [ "$HEAD_REPO" != "$BASE_REPO" ] || [ "$BOT" = "1" ]; then
            echo "run_trusted_scan=false" >> "$GITHUB_OUTPUT"
            FORK_MSG="$(node -p "JSON.parse(require('fs').readFileSync('scripts/ci/scan-surface-copy.generated.json','utf8'))['actions.prAnalysisUnavailableFork']")"
            DEP_MSG="$(node -p "JSON.parse(require('fs').readFileSync('scripts/ci/scan-surface-copy.generated.json','utf8'))['actions.prAnalysisUnavailableDependabot']")"
            {
              echo "## MergeSignal"
              echo ""
              if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
                echo "$FORK_MSG"
              else
                echo "$DEP_MSG"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            if [ -n "${MS_ENGINE_PAT:-}" ]; then
              echo "run_trusted_scan=true" >> "$GITHUB_OUTPUT"
            elif [ "$REPO" = "$CANONICAL" ]; then
              fail_trusted_required_no_pat
            else
              echo "run_trusted_scan=false" >> "$GITHUB_OUTPUT"
              MSG="$(node -p "JSON.parse(require('fs').readFileSync('scripts/ci/scan-surface-copy.generated.json','utf8'))['actions.pushTrustedScanSkippedNoEngineToken']")"
              {
                echo "## MergeSignal"
                echo ""
                echo "$MSG"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: MergeSignal scan
        if: steps.ms_context.outputs.run_trusted_scan == 'true'
        uses: ./.github/actions/merge-signal-scan
        with:
          fail_above: ${{ github.event.inputs.fail_above || '' }}
          scan_profile: trusted
          engine_repo_token: ${{ secrets.MERGESIGNAL_ENGINE_REPO_TOKEN }}
          engine_repository: ${{ vars.MERGESIGNAL_ENGINE_REPOSITORY || 'MergeSignal/mergesignal-engine' }}
          engine_ref: ${{ vars.MERGESIGNAL_ENGINE_REF || 'main' }}
          engine_impl_file: ${{ vars.MERGESIGNAL_ENGINE_IMPL_FILE || 'packages/analysis-engine/dist/index.js' }}

      - name: Upload results
        if: success() && steps.ms_context.outputs.run_trusted_scan == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mergesignal-scan
          path: ${{ runner.temp }}/mergesignal-scan.json
          if-no-files-found: error
