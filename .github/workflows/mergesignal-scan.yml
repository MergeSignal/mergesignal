name: MergeSignal scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_above:
        description: "Fail if totalScore > this value (0..100). Leave empty to not fail."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: mergesignal-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MergeSignal scan
        uses: ./.github/actions/merge-signal-scan
        with:
          fail_above: ${{ github.event.inputs.fail_above || '' }}
          scan_profile: ${{ secrets.MERGESIGNAL_NPM_TOKEN != '' && 'trusted' || 'development' }}
          npm_registry_url: ${{ vars.MERGESIGNAL_NPM_REGISTRY_URL || 'https://registry.npmjs.org' }}
          engine_package: ${{ secrets.MERGESIGNAL_ENGINE_PACKAGE }}
          engine_impl_module: ${{ vars.MERGESIGNAL_ENGINE_IMPL_MODULE }}
          npm_token: ${{ secrets.MERGESIGNAL_NPM_TOKEN }}

      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mergesignal-scan
          path: ${{ runner.temp }}/mergesignal-scan.json
          if-no-files-found: error
