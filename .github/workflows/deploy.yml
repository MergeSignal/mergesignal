name: Build and Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: reposentinel

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run type checking
        run: pnpm check-types

      - name: Run linter
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/reposentinel/api:$IMAGE_TAG -f apps/api/Dockerfile .
          docker tag $ECR_REGISTRY/reposentinel/api:$IMAGE_TAG $ECR_REGISTRY/reposentinel/api:latest
          docker push $ECR_REGISTRY/reposentinel/api:$IMAGE_TAG
          docker push $ECR_REGISTRY/reposentinel/api:latest

      - name: Build and push Worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/reposentinel/worker:$IMAGE_TAG -f apps/worker/Dockerfile .
          docker tag $ECR_REGISTRY/reposentinel/worker:$IMAGE_TAG $ECR_REGISTRY/reposentinel/worker:latest
          docker push $ECR_REGISTRY/reposentinel/worker:$IMAGE_TAG
          docker push $ECR_REGISTRY/reposentinel/worker:latest

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/reposentinel/web:$IMAGE_TAG -f apps/web/Dockerfile .
          docker tag $ECR_REGISTRY/reposentinel/web:$IMAGE_TAG $ECR_REGISTRY/reposentinel/web:latest
          docker push $ECR_REGISTRY/reposentinel/web:$IMAGE_TAG
          docker push $ECR_REGISTRY/reposentinel/web:latest

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to staging
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Update image tags in deployment files
          sed -i "s|reposentinel/api:latest|$ECR_REGISTRY/reposentinel/api:$IMAGE_TAG|g" k8s/api-deployment.yaml
          sed -i "s|reposentinel/worker:latest|$ECR_REGISTRY/reposentinel/worker:$IMAGE_TAG|g" k8s/worker-deployment.yaml
          sed -i "s|reposentinel/web:latest|$ECR_REGISTRY/reposentinel/web:$IMAGE_TAG|g" k8s/web-deployment.yaml
          
          # Apply Kubernetes manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/web-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n reposentinel --timeout=5m
          kubectl rollout status deployment/worker -n reposentinel --timeout=5m
          kubectl rollout status deployment/web -n reposentinel --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n reposentinel
          kubectl get services -n reposentinel

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to production
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Update image tags in deployment files
          sed -i "s|reposentinel/api:latest|$ECR_REGISTRY/reposentinel/api:$IMAGE_TAG|g" k8s/api-deployment.yaml
          sed -i "s|reposentinel/worker:latest|$ECR_REGISTRY/reposentinel/worker:$IMAGE_TAG|g" k8s/worker-deployment.yaml
          sed -i "s|reposentinel/web:latest|$ECR_REGISTRY/reposentinel/web:$IMAGE_TAG|g" k8s/web-deployment.yaml
          
          # Apply Kubernetes manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/web-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n reposentinel --timeout=5m
          kubectl rollout status deployment/worker -n reposentinel --timeout=5m
          kubectl rollout status deployment/web -n reposentinel --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n reposentinel
          kubectl get services -n reposentinel

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
