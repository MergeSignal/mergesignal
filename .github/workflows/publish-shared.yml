# Publish @mergesignal/shared to the public npm registry on shared-v* tags.
#
# Maintainer flow:
#   git tag shared-v0.2.0
#   git push origin shared-v0.2.0
#
# Requires GitHub secret NPM_TOKEN: granular Read/Write on @mergesignal with Bypass 2FA
# when the org enforces 2FA (otherwise publish fails with npm error EOTP).
#
# After a successful publish, sends repository_dispatch event `shared-package-released` to
# mergesignal-engine (see docs/engineering/releasing.md). Requires secret
# MERGESIGNAL_ENGINE_DISPATCH_TOKEN. The workflow fails if dispatch cannot be sent.
#
# Recovery: if publish succeeded but dispatch failed, re-run with notify_only=true
# (workflow_dispatch) to resend without republishing.
#
# After the first successful publish, optionally configure npm trusted publishing
# (publish-shared.yml) and switch to OIDC — see docs/engineering/releasing.md.

name: Publish @mergesignal/shared

on:
  push:
    tags:
      - "shared-v*"
  workflow_dispatch:
    inputs:
      notify_only:
        description: "Skip build/publish; verify version on npm and send engine dispatch (recovery)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@mergesignal"
          always-auth: true

      - name: Enable pnpm via Corepack
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_only != true }}
        run: |
          corepack enable
          corepack install

      - name: Resolve version from tag or package.json
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./packages/shared/package.json').version")
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#shared-v}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
              echo "Tag must match shared-vX.Y.Z (got: $TAG)" >&2
              exit 1
            fi
            PKG_VERSION=$(node -p "require('./packages/shared/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "packages/shared/package.json version ($PKG_VERSION) must match tag ($VERSION)" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Verify npm token
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_only != true }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set."
            exit 1
          fi
          echo "npm user: $(npm whoami)"

      - name: Install dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_only != true }}
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test shared package
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_only != true }}
        run: |
          pnpm -F @mergesignal/shared build
          pnpm -F @mergesignal/shared test

      - name: Verify version not already on registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_only != true }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # Repo .npmrc routes @mergesignal to GitHub Packages; shared is published to npmjs.org.
          if npm view "@mergesignal/shared@${VERSION}" version --registry https://registry.npmjs.org/ 2>/dev/null; then
            echo "::error::@mergesignal/shared@${VERSION} is already on npm. Published versions are immutable — bump packages/shared/package.json and push a new shared-v* tag (see docs/engineering/releasing.md)." >&2
            exit 1
          fi
          echo "Version ${VERSION} is not published yet."

      - name: Publish to npm
        id: publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.notify_only != true }}
        working-directory: packages/shared
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          # Re-point @mergesignal scope to npmjs for publish (repo .npmrc routes it to GH Packages).
          npm config set @mergesignal:registry https://registry.npmjs.org/
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm whoami
          npm publish --access public 2>&1 | tee /tmp/npm-publish.log
          exit "${PIPESTATUS[0]}"

      - name: Publish failure hint
        if: failure() && steps.publish.outcome == 'failure'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/npm-publish.log ]; then
            echo "::error::npm publish failed before a publish log was written; see the Publish to npm step."
            exit 1
          fi
          if grep -q EOTP /tmp/npm-publish.log; then
            echo "::error::npm EOTP: recreate NPM_TOKEN with Bypass 2FA enabled (org enforces 2FA), or configure npm trusted publishing for this workflow. See docs/engineering/releasing.md."
          elif grep -q ENEEDAUTH /tmp/npm-publish.log; then
            echo "::error::npm auth failed: check NPM_TOKEN or configure trusted publishing (publish-shared.yml) on the @mergesignal/shared package."
          else
            echo "::error::npm publish failed; see the Publish to npm step log above."
            tail -30 /tmp/npm-publish.log >&2 || true
          fi
          exit 1

      - name: Verify published version on registry
        if: steps.publish.outcome == 'success' || (github.event_name == 'workflow_dispatch' && inputs.notify_only == true)
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # Repo .npmrc routes @mergesignal to GitHub Packages; shared is published to npmjs.org.
          PUBLISHED=$(npm view "@mergesignal/shared@${VERSION}" version --registry https://registry.npmjs.org/ 2>/dev/null || true)
          if [ "$PUBLISHED" != "$VERSION" ]; then
            echo "::error::Expected @mergesignal/shared@${VERSION} on npm, got: ${PUBLISHED:-<none>}" >&2
            exit 1
          fi
          echo "Confirmed @mergesignal/shared@${VERSION} is on npm."

      - name: Notify engine repository
        if: steps.publish.outcome == 'success' || (github.event_name == 'workflow_dispatch' && inputs.notify_only == true)
        env:
          GH_TOKEN: ${{ secrets.MERGESIGNAL_ENGINE_DISPATCH_TOKEN }}
          ENGINE_REPO: ${{ vars.MERGESIGNAL_ENGINE_REPOSITORY }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::MERGESIGNAL_ENGINE_DISPATCH_TOKEN secret is not set."
            exit 1
          fi
          ENGINE_REPO="${ENGINE_REPO:-MergeSignal/mergesignal-engine}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG=""
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          fi
          echo "Dispatching shared-package-released for ${VERSION} (tag=${TAG:-<none>}, sha=${{ github.sha }}) to ${ENGINE_REPO}"
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${ENGINE_REPO}/dispatches" \
            -f event_type='shared-package-released' \
            -f "client_payload[package]=@mergesignal/shared" \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[commit_sha]=${{ github.sha }}"
          echo "Engine dispatch sent successfully."
