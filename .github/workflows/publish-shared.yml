# Publish @mergesignal/shared to the public npm registry on shared-v* tags.
#
# Maintainer flow:
#   git tag shared-v0.2.0
#   git push origin shared-v0.2.0
#
# Requires repository secret NPM_TOKEN (Automation token with publish permission).
# Optional: GitHub Environment "npm-publish" with required reviewers.

name: Publish @mergesignal/shared

on:
  push:
    tags:
      - "shared-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Optional: set `environment: npm-publish` after creating that environment and
    # copying NPM_TOKEN into it (environment secrets override repo secrets).
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version from tag or package.json
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./packages/shared/package.json').version")
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#shared-v}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
              echo "Tag must match shared-vX.Y.Z (got: $TAG)" >&2
              exit 1
            fi
            PKG_VERSION=$(node -p "require('./packages/shared/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "packages/shared/package.json version ($PKG_VERSION) must match tag ($VERSION)" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Verify npm token and org access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          WHOAMI=$(npm whoami)
          echo "npm user: $WHOAMI"
          if ! npm team ls mergesignal >/dev/null 2>&1; then
            echo "::error::npm user '$WHOAMI' is not a member of the @mergesignal org (or the org does not exist)."
            echo "Create https://www.npmjs.com/org/create (name: mergesignal) and add this user with publish access,"
            echo "or use an org-scoped Automation token from npm → mergesignal → Access Tokens."
            exit 1
          fi
          echo "OK: $WHOAMI can access @mergesignal"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test shared package
        run: |
          pnpm -F @mergesignal/shared build
          pnpm -F @mergesignal/shared test

      - name: Verify version not already on registry
        run: |
          set -euo pipefail
          if npm view "@mergesignal/shared@${{ steps.version.outputs.version }}" version 2>/dev/null; then
            echo "Version ${{ steps.version.outputs.version }} is already published; unpublish is not supported for rollback." >&2
            exit 1
          fi
          echo "Version ${{ steps.version.outputs.version }} is not published yet."

      - name: Publish to npm
        working-directory: packages/shared
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public
