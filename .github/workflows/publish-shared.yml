# Publish @mergesignal/shared to the public npm registry on shared-v* tags.
#
# Maintainer flow:
#   git tag shared-v0.2.0
#   git push origin shared-v0.2.0
#
# Publishing uses npm trusted publishing (OIDC) when configured on npmjs.com:
#   Package @mergesignal/shared → Settings → Trusted publishing
#   Provider: GitHub Actions, repo MergeSignal/mergesignal, workflow publish-shared.yml
#
# Fallback: set GitHub secret NPM_TOKEN (granular Read/Write + Bypass 2FA if org 2FA is on).

name: Publish @mergesignal/shared

on:
  push:
    tags:
      - "shared-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve version from tag or package.json
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./packages/shared/package.json').version")
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#shared-v}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
              echo "Tag must match shared-vX.Y.Z (got: $TAG)" >&2
              exit 1
            fi
            PKG_VERSION=$(node -p "require('./packages/shared/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "packages/shared/package.json version ($PKG_VERSION) must match tag ($VERSION)" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test shared package
        run: |
          pnpm -F @mergesignal/shared build
          pnpm -F @mergesignal/shared test

      - name: Verify version not already on registry
        run: |
          set -euo pipefail
          if npm view "@mergesignal/shared@${{ steps.version.outputs.version }}" version 2>/dev/null; then
            echo "Version ${{ steps.version.outputs.version }} is already published; unpublish is not supported for rollback." >&2
            exit 1
          fi
          echo "Version ${{ steps.version.outputs.version }} is not published yet."

      - name: Publish to npm (OIDC trusted publishing)
        working-directory: packages/shared
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          set -euo pipefail
          npm install -g npm@11
          # Ensure publish uses GitHub OIDC, not a stale _authToken from setup-node
          if [ -f "$HOME/.npmrc" ]; then
            grep -v '_authToken' "$HOME/.npmrc" > "$HOME/.npmrc.tmp" || true
            mv "$HOME/.npmrc.tmp" "$HOME/.npmrc"
          fi
          npm publish --access public

      - name: Publish to npm (NPM_TOKEN fallback)
        if: failure()
        working-directory: packages/shared
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "OIDC publish failed and NPM_TOKEN is not set; skipping token fallback."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "$HOME/.npmrc"
          npm publish --access public
