# Internal: proves MERGESIGNAL_TRUSTED_ANALYSIS + MERGESIGNAL_ENGINE_IMPL resolve on CI runners.
# Not triggered by pull_request — avoids extra PR checks (see apps/cli mergesignalScanWorkflow.test.ts).
name: Trusted engine verification

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: trusted-engine-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trusted-scan-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@mergesignal"
          always-auth: true

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CLI
        run: pnpm turbo run build --filter=@mergesignal/cli...

      - name: Trusted scan with workspace test engine
        env:
          MERGESIGNAL_TRUSTED_ANALYSIS: "1"
          MERGESIGNAL_ENGINE_IMPL: "file:${{ github.workspace }}/packages/engine-test-fixture/dist/index.js"
          MERGESIGNAL_ENGINE_STRICT: "1"
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/mergesignal-trusted-fixture.json"
          pnpm ms scan --repo-id "${{ github.repository }}" --out "$OUT"
