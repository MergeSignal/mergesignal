name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@mergesignal"
          always-auth: true

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages (generates type definitions)
        run: pnpm build

      - name: Shared package pack smoke
        run: |
          set -euo pipefail
          cd packages/shared
          npm pack --dry-run 2>&1 | tee /tmp/shared-pack.log
          grep -q 'dist/' /tmp/shared-pack.log
          if grep -E 'npm notice.*[[:space:]]src/' /tmp/shared-pack.log; then
            echo "::error::@mergesignal/shared pack must not include src/"
            exit 1
          fi

      - name: Run type checking
        run: pnpm check-types

      - name: Run linter
        run: pnpm lint

      - name: Knip (unused files & dependencies)
        run: pnpm knip

      - name: Check formatting
        run: pnpm format:check

      - name: Forbid duplicated scan-prep modules in workers
        run: bash scripts/ci/forbid-worker-prep-duplication.sh

      - name: Check pnpm version governance
        run: pnpm check:pnpm-governance

      - name: Check contracts catalog alignment
        run: pnpm check:contracts-catalog

      - name: Run tests
        run: pnpm test

  verify-worker-runtime-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@mergesignal"
          always-auth: true

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Build worker runtime image (fixture engine)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : > /tmp/empty-engine-secret
          printf '%s' "$NODE_AUTH_TOKEN" > /tmp/gh-packages-token
          docker build \
            -f apps/worker/Dockerfile \
            --build-arg MERGESIGNAL_ENGINE_FIXTURE=1 \
            --secret id=engine_repo_token,src=/tmp/empty-engine-secret \
            --secret id=gh_packages_token,src=/tmp/gh-packages-token \
            -t mergesignal-worker:ci-verify \
            .
          rm -f /tmp/gh-packages-token
          SIZE_MB="$(docker inspect -f '{{.Size}}' mergesignal-worker:ci-verify | awk '{printf "%.0f", $1/1024/1024}')"
          echo "Runtime image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 600 ]; then
            echo "::error::Worker image ${SIZE_MB}MB exceeds 600MB hard limit"
            exit 1
          elif [ "$SIZE_MB" -gt 350 ]; then
            echo "::warning::Worker image ${SIZE_MB}MB exceeds 350MB soft threshold"
          fi
          if docker inspect mergesignal-worker:ci-verify | grep -iE 'ghp_|github_pat_'; then
            echo "::error::Possible GitHub token pattern found in image metadata"
            exit 1
          fi
          docker run --rm mergesignal-worker:ci-verify /scripts/verify-runtime-image-clean.sh
          docker run --rm mergesignal-worker:ci-verify /scripts/verify-runtime-engine.sh
