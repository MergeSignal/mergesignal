# Deploy web + API to Fly.io (avoids corporate TLS issues on laptops).
#
# GitHub Actions secrets (one per Fly app–scoped deploy token):
#   FLY_API_TOKEN_MERGESIGNAL_WEB
#   FLY_API_TOKEN_MERGESIGNAL_API
# Settings → Secrets and variables → Actions

name: Deploy Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy web
        run: flyctl deploy . --config apps/web/fly.toml --dockerfile apps/web/Dockerfile --depot=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MERGESIGNAL_WEB }}

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy . --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --depot=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MERGESIGNAL_API }}
