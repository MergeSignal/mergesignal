name: MergeSignal scan
description: Scan npm lockfile risk on every run and add an actionable summary to GitHub Actions (no merge server required). When scan_profile is trusted, runs a short post-summary audit so stub/demo output cannot pass as production.
inputs:
  fail_above:
    description: Fail if totalScore exceeds this value (0-100). Leave empty to not fail the job.
    required: false
    default: ""
  scan_profile:
    description: >
      "trusted" checks out the private engine GitHub repository, builds it, and sets MERGESIGNAL_ENGINE_IMPL to a file URL (requires engine_repo_token). "development" uses the OSS stub for demos and forks without private engine access.
    required: false
    default: "development"
  engine_repo_token:
    description: >
      GitHub token with read access to the private engine repository only (never log or echo).
      Pass from the calling workflow with inputs.engine_repo_token set to a secret reference
      (for example repository secret MERGESIGNAL_ENGINE_REPO_TOKEN). Required when scan_profile is trusted.
    required: false
    default: ""
  engine_repository:
    description: >
      Owner/name of the private engine repository to checkout and build when scan_profile is trusted.
    required: false
    default: "MergeSignal/mergesignal-engine"
  engine_ref:
    description: Git ref (branch, tag, or SHA) to checkout for the engine repository when scan_profile is trusted.
    required: false
    default: "main"
  engine_impl_file:
    description: >
      Path relative to the engine repository root for the built ESM entry file (must export analyze and simulateUpgrade)
      after `pnpm build` or `npm run build`.
    required: false
    default: "dist/index.js"

runs:
  using: composite
  steps:
    - name: Resolve MergeSignal version
      id: toolchain-ref
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ github.action_ref }}" ]; then
          echo "ref=${{ github.action_ref }}" >> "$GITHUB_OUTPUT"
        elif [ "${{ github.repository }}" = "MergeSignal/mergesignal" ]; then
          echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "ref=main" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up MergeSignal
      uses: actions/checkout@v4
      with:
        repository: MergeSignal/mergesignal
        ref: ${{ steps.toolchain-ref.outputs.ref }}
        path: _ms_rt

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version-file: _ms_rt/.nvmrc

    - name: Install and build MergeSignal
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE/_ms_rt"
        corepack enable
        corepack install
        pnpm install --frozen-lockfile
        pnpm turbo run build --filter=@mergesignal/cli...

    - name: Require engine repo token (trusted only)
      if: inputs.scan_profile == 'trusted'
      shell: bash
      env:
        ENGINE_REPO_TOKEN: ${{ inputs.engine_repo_token }}
      run: |
        set -euo pipefail
        if [ -z "${ENGINE_REPO_TOKEN:-}" ]; then
          echo "::error::merge-signal-scan: trusted profile requires inputs.engine_repo_token" >&2
          exit 1
        fi

    - name: Checkout private MergeSignal engine
      if: inputs.scan_profile == 'trusted'
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.engine_repository }}
        ref: ${{ inputs.engine_ref }}
        path: _ms_engine
        token: ${{ inputs.engine_repo_token }}
        persist-credentials: false

    - name: Build private engine (trusted only)
      if: inputs.scan_profile == 'trusted'
      id: engine-impl
      shell: bash
      env:
        ENGINE_IMPL_FILE: ${{ inputs.engine_impl_file }}
      run: |
        set -euo pipefail
        ROOT="$GITHUB_WORKSPACE/_ms_engine"
        cd "$ROOT"
        if [ -f pnpm-lock.yaml ]; then
          corepack enable
          corepack install
          pnpm install --frozen-lockfile
          pnpm run build
        elif [ -f package-lock.json ]; then
          npm ci
          npm run build
        else
          echo "::error::merge-signal-scan: engine repository must contain pnpm-lock.yaml or package-lock.json" >&2
          exit 1
        fi
        rel="${ENGINE_IMPL_FILE#./}"
        rel="${rel#/}"
        file="$ROOT/$rel"
        if [ ! -f "$file" ]; then
          echo "::error::merge-signal-scan: engine build did not produce ${rel} (check engine_impl_file input)" >&2
          exit 1
        fi
        echo "spec=file:${file}" >> "$GITHUB_OUTPUT"

    - name: Run dependency scan
      id: scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SCAN_JSON: ${{ runner.temp }}/mergesignal-scan.json
        MERGESIGNAL_TRUSTED_ANALYSIS: ${{ inputs.scan_profile == 'trusted' && '1' || '' }}
        MERGESIGNAL_ENGINE_STRICT: ${{ inputs.scan_profile == 'trusted' && '1' || '' }}
        MERGESIGNAL_ENGINE_IMPL: ${{ inputs.scan_profile == 'trusted' && steps.engine-impl.outputs.spec || '' }}
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"
        echo "MergeSignal scan for $GITHUB_REPOSITORY"
        pnpm --dir _ms_rt ms scan --repo-id "$GITHUB_REPOSITORY" --out "$SCAN_JSON"

    - name: Add scan summary to workflow
      if: success()
      shell: bash
      env:
        SCAN_JSON: ${{ runner.temp }}/mergesignal-scan.json
        MERGESIGNAL_ACTIONS_SUMMARY_PROFILE: ${{ inputs.scan_profile }}
      run: |
        set -euo pipefail
        node "$GITHUB_WORKSPACE/_ms_rt/scripts/ci/render-mergesignal-step-summary.mjs" \
          "$SCAN_JSON"

    - name: Audit trusted Actions output
      if: success() && inputs.scan_profile == 'trusted'
      shell: bash
      env:
        SCAN_JSON: ${{ runner.temp }}/mergesignal-scan.json
        MERGESIGNAL_TRUSTED_ANALYSIS: "1"
      run: |
        set -euo pipefail
        node "$GITHUB_WORKSPACE/_ms_rt/scripts/ci/audit-trusted-actions-output.mjs" \
          "$SCAN_JSON" "$GITHUB_STEP_SUMMARY"

    - name: Add failure summary to workflow
      if: failure()
      shell: bash
      run: |
        set -euo pipefail
        node "$GITHUB_WORKSPACE/_ms_rt/scripts/ci/render-mergesignal-failure-summary.mjs" || true

    - name: Verify score threshold
      if: ${{ inputs.fail_above != '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MERGESIGNAL_TRUSTED_ANALYSIS: ${{ inputs.scan_profile == 'trusted' && '1' || '' }}
        MERGESIGNAL_ENGINE_STRICT: ${{ inputs.scan_profile == 'trusted' && '1' || '' }}
        MERGESIGNAL_ENGINE_IMPL: ${{ inputs.scan_profile == 'trusted' && steps.engine-impl.outputs.spec || '' }}
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"
        pnpm --dir _ms_rt ms scan --repo-id "$GITHUB_REPOSITORY" --fail-above "${{ inputs.fail_above }}"
