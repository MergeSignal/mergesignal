apiVersion: v1
kind: Secret
metadata:
  name: reposentinel-secrets
  namespace: reposentinel
type: Opaque
stringData:
  # Database connection
  # Update these values with your actual production database credentials
  DATABASE_URL: "postgresql://reposentinel:CHANGE_ME@postgres-service:5432/reposentinel?schema=public"
  
  # Redis connection
  REDIS_URL: "redis://redis-service:6379"
  
  # GitHub App configuration (optional)
  # Uncomment and set these if you're using GitHub App integration
  # GITHUB_APP_ID: ""
  # GITHUB_PRIVATE_KEY: ""
  # GITHUB_WEBHOOK_SECRET: ""
  # GITHUB_TOKEN: ""
