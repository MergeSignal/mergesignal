apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mergesignal-ingress
  namespace: mergesignal
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
# Hosts match the public Fly.io apps. For AWS/other ingress with your own domain, replace hosts and TLS.
spec:
  tls:
    - hosts:
        - mergesignal-web.fly.dev
        - mergesignal-api.fly.dev
      secretName: mergesignal-tls
  rules:
    - host: mergesignal-web.fly.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 3000
    - host: mergesignal-api.fly.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 4000
